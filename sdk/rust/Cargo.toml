[package]
authors       = { workspace = true }
categories    = { workspace = true }
description   = "Rust SDK for interacting with a Dango node: GraphQL client, WebSocket subscriptions, key management, transaction signing"
documentation = { workspace = true }
edition       = { workspace = true }
license       = { workspace = true }
name          = "dango-sdk"
repository    = { workspace = true }
rust-version  = { workspace = true }
version       = { workspace = true }

[features]
tracing = ["dep:tracing"]

[dependencies]
aes-gcm           = { workspace = true, features = ["std"] }
alloy             = { workspace = true }
anyhow            = { workspace = true }
async-trait       = { workspace = true }
bip32             = { workspace = true }
dango-auth        = { workspace = true }
dango-types       = { workspace = true }
error-backtrace   = { workspace = true }
eth-utils         = { workspace = true }
futures           = { workspace = true }
graphql_client    = { workspace = true }
grug              = { workspace = true }
grug-types        = { workspace = true }
identity          = { workspace = true }
k256              = { workspace = true }
paste             = { workspace = true }
pbkdf2            = { workspace = true }
rand              = { workspace = true }
reqwest           = { workspace = true, features = ["json"] }
serde             = { workspace = true }
serde_json        = { workspace = true }
sha2              = { workspace = true }
thiserror         = { workspace = true }
tokio             = { workspace = true }
tokio-tungstenite = { workspace = true }
tracing           = { workspace = true, optional = true }
url               = { workspace = true }

[dev-dependencies]
assert-json-diff      = { workspace = true }
assertor              = { workspace = true }
dango-account-factory = { workspace = true, features = ["library"] }
dango-genesis         = { workspace = true }
dango-mock-httpd      = { workspace = true }
dango-testing         = { workspace = true }
grug-testing          = { workspace = true }
indexer-testing       = { workspace = true }
tokio                 = { workspace = true }
tracing               = { workspace = true }
