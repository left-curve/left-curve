# SOPS configuration skeleton for deploy secrets.
#
# Replace every placeholder with a real public age/YubiKey recipient before
# creating or re-encrypting SOPS files. The placeholders are intentionally
# invalid so accidental SOPS use fails closed.
#
# Team policy:
# - one YubiKey-backed age recipient per user
# - no backup age key per user
# - deploy-ci is generated on a trusted desktop
# - deploy-ci is included only for routine deploy files in phase 1
# - deploy-ci is intentionally excluded from root/debian files in phase 1
#
# Placeholder map:
# - age1yubikey1q2jpj60frm2eh0lndcqf8he649yrmtp9z5n5l4l8e5rhmpncck03vsjwh62  # penso
# - age1yubikey1qdvpvuaxnxxrhdghjzmcm2m69w6f480h9wwt8g2900mu8pm2npn32hwdz5x  # larry
# - age1yubikey1qtwrakqqgzc4pue7fg5xp2d6vnna8xvd7vh7vtzvk37jvcc8zawnjvzcyce  # rhaki
# - age1yubikey1q2ltwfyvzecj9nfr862nql2z67rwejwr6rjnzn8aspc8la3ax5gkkn5upmh  # zexsor
# - age1PLACEHOLDER_J0NL1_YUBIKEY      # j0nl1
# - age1PLACEHOLDER_KYAR1S_YUBIKEY     # kyar1s
# - age1PLACEHOLDER_DEPLOY_CI_DESKTOP  # deploy-ci public recipient

creation_rules:
  # Routine deploy files: penso, larry, rhaki, zexsor, j0nl1, kyar1s, deploy-ci.
  - path_regex: ^(deploy/)?group_vars/all/vault\.sops\.yml$
    age: >-
      age1yubikey1q2jpj60frm2eh0lndcqf8he649yrmtp9z5n5l4l8e5rhmpncck03vsjwh62,
      age1yubikey1qdvpvuaxnxxrhdghjzmcm2m69w6f480h9wwt8g2900mu8pm2npn32hwdz5x,
      age1yubikey1qtwrakqqgzc4pue7fg5xp2d6vnna8xvd7vh7vtzvk37jvcc8zawnjvzcyce,
      age1yubikey1q2ltwfyvzecj9nfr862nql2z67rwejwr6rjnzn8aspc8la3ax5gkkn5upmh,
      age1PLACEHOLDER_J0NL1_YUBIKEY,
      age1PLACEHOLDER_KYAR1S_YUBIKEY,
      age1PLACEHOLDER_DEPLOY_CI_DESKTOP

  - path_regex: ^(deploy/)?group_vars/all/deploy_key\.sops$
