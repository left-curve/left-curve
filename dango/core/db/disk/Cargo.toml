[package]
authors       = { workspace = true }
categories    = { workspace = true }
documentation = { workspace = true }
edition       = { workspace = true }
license       = { workspace = true }
name          = "dango-db-disk"
repository    = { workspace = true }
rust-version  = { workspace = true }
version       = { workspace = true }

[features]
metrics = ["dango-primitives/metrics", "dep:metrics"]
tracing = ["dep:tracing", "dep:uuid"]

[dependencies]
dango-app        = { workspace = true }
dango-backtrace  = { workspace = true }
dango-primitives = { workspace = true }
hex              = { workspace = true }
itertools        = { workspace = true }
metrics          = { workspace = true, optional = true }
num_cpus         = { workspace = true }
parking_lot      = { workspace = true }
rocksdb          = { workspace = true }
thiserror        = { workspace = true }
tracing          = { workspace = true, optional = true }
uuid             = { workspace = true, optional = true }

[dev-dependencies]
dango-jmt          = { workspace = true }
dango-storage      = { workspace = true }
dango-temp-rocksdb = { workspace = true }
hex-literal        = { workspace = true }
proptest           = { workspace = true }
