[package]
authors       = { workspace = true }
categories    = { workspace = true }
documentation = { workspace = true }
edition       = { workspace = true }
license       = { workspace = true }
name          = "dango-app"
repository    = { workspace = true }
rust-version  = { workspace = true }
version       = { workspace = true }

[features]
abci    = ["data-encoding", "tendermint", "tower", "tower-abci"]
metrics = ["dep:metrics", "dango-primitives/metrics"]
testing = []
tracing = ["dep:tracing", "dango-primitives/chrono"]

[dependencies]
async-trait     = { workspace = true }
borsh           = { workspace = true }
data-encoding   = { workspace = true, optional = true }
dango-dyn-event       = { workspace = true }
dango-backtrace = { workspace = true }
dango-storage    = { workspace = true }
dango-primitives      = { workspace = true }
metrics         = { workspace = true, optional = true }
prost           = { workspace = true }
sha2            = { workspace = true }
tendermint      = { workspace = true, optional = true }
thiserror       = { workspace = true }
tokio           = { workspace = true }
tower           = { workspace = true, optional = true }
tower-abci      = { workspace = true, optional = true }
tracing         = { workspace = true, optional = true }
