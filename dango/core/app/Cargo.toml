[package]
authors       = { workspace = true }
categories    = { workspace = true }
documentation = { workspace = true }
edition       = { workspace = true }
license       = { workspace = true }
name          = "dango-app"
repository    = { workspace = true }
rust-version  = { workspace = true }
version       = { workspace = true }

[features]
abci    = ["data-encoding", "tendermint", "tower", "tower-abci"]
metrics = ["dango-primitives/metrics", "dep:metrics"]
testing = []
tracing = ["dango-primitives/chrono", "dep:tracing"]

[dependencies]
async-trait      = { workspace = true }
borsh            = { workspace = true }
dango-backtrace  = { workspace = true }
dango-dyn-event  = { workspace = true }
dango-math       = { workspace = true }
dango-primitives = { workspace = true }
dango-storage    = { workspace = true }
data-encoding    = { workspace = true, optional = true }
metrics          = { workspace = true, optional = true }
prost            = { workspace = true }
sha2             = { workspace = true }
tendermint       = { workspace = true, optional = true }
thiserror        = { workspace = true }
tokio            = { workspace = true }
tower            = { workspace = true, optional = true }
tower-abci       = { workspace = true, optional = true }
tracing          = { workspace = true, optional = true }
