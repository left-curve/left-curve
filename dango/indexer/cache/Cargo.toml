[package]
authors       = { workspace = true }
categories    = { workspace = true }
documentation = { workspace = true }
edition       = { workspace = true }
license       = { workspace = true }
name          = "indexer-cache"
repository    = { workspace = true }
rust-version  = { workspace = true }
version       = { workspace = true }

[lib]
path = "src/lib.rs"

[features]
http-request-details = []
metrics              = ["dep:metrics"]
s3                   = ["dep:aws-config", "dep:aws-credential-types", "dep:aws-sdk-s3"]
tracing              = ["dep:tracing"]

[dependencies]
aws-config           = { workspace = true, optional = true }
aws-credential-types = { workspace = true, optional = true }
aws-sdk-s3           = { workspace = true, optional = true }
borsh                = { workspace = true }
disk-saver           = { workspace = true, features = ["tracing"] }
error-backtrace      = { workspace = true }
grug-app             = { workspace = true }
grug-types           = { workspace = true, features = ["chrono", "sea-orm"] }
metrics              = { workspace = true, optional = true }
roaring              = { workspace = true }
serde                = { workspace = true }
serde_json           = { workspace = true }
tempfile             = { workspace = true }
thiserror            = { workspace = true }
tokio                = { workspace = true, features = ["rt", "rt-multi-thread", "sync"] }
tracing              = { workspace = true, optional = true }

[dev-dependencies]
assertor = { workspace = true }
