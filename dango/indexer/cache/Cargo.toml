[package]
authors       = { workspace = true }
categories    = { workspace = true }
documentation = { workspace = true }
edition       = { workspace = true }
license       = { workspace = true }
name          = "dango-indexer-cache"
repository    = { workspace = true }
rust-version  = { workspace = true }
version       = { workspace = true }

[lib]
path = "src/lib.rs"

[features]
http-request-details = []
metrics              = ["dep:metrics"]
s3                   = ["dep:aws-config", "dep:aws-credential-types", "dep:aws-sdk-s3"]
tracing              = ["dep:tracing"]
# In-process xz codec (links liblzma via xz2). Off by default so the base build
# and cross-compiled producers stay pure-Rust; a shell-out codec can be used
# instead by implementing `compress::Codec`.
xz-codec = ["dep:xz2"]

[dependencies]
aws-config           = { workspace = true, optional = true }
aws-credential-types = { workspace = true, optional = true }
aws-sdk-s3           = { workspace = true, optional = true }
borsh                = { workspace = true }
dango-app            = { workspace = true }
dango-backtrace      = { workspace = true }
dango-disk-saver     = { workspace = true, features = ["tracing"] }
dango-primitives     = { workspace = true, features = ["chrono", "sea-orm"] }
lzma-rs              = { workspace = true }
metrics              = { workspace = true, optional = true }
roaring              = { workspace = true }
serde                = { workspace = true }
serde_json           = { workspace = true }
tar                  = { workspace = true }
tempfile             = { workspace = true }
thiserror            = { workspace = true }
tokio                = { workspace = true, features = ["rt", "rt-multi-thread", "sync"] }
tracing              = { workspace = true, optional = true }
xz2                  = { workspace = true, optional = true }

[dev-dependencies]
assertor = { workspace = true }
