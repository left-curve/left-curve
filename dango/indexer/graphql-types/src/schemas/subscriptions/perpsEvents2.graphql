subscription SubscribePerpsEvents2(
  $sinceBlockHeight: Int
  $eventTypes: [String!]
  $pairIds: [String!]
  $users: [String!]
  $orderIds: [String!]
  $clientOrderIds: [String!]
) {
  perpsEvents2(
    sinceBlockHeight: $sinceBlockHeight
    eventTypes: $eventTypes
    pairIds: $pairIds
    users: $users
    orderIds: $orderIds
    clientOrderIds: $clientOrderIds
  ) {
    blockHeight
    createdAt
    events {
      idx
      eventType
      user
      pairId
      orderId
      clientOrderId
      data
    }
  }
}
