[package]
authors       = { workspace = true }
categories    = { workspace = true }
documentation = { workspace = true }
edition       = { workspace = true }
license       = { workspace = true }
name          = "dango-httpd"
repository    = { workspace = true }
rust-version  = { workspace = true }
version       = { workspace = true }

[features]
metrics = [
  "dango-indexer-clickhouse/metrics",
  "dep:actix-web-metrics",
  "dep:metrics",
  "indexer-httpd/metrics",
]
tracing = []

[dependencies]
actix-cors               = { workspace = true }
actix-files              = { workspace = true }
actix-web                = { workspace = true }
actix-web-metrics        = { workspace = true, optional = true }
async-graphql            = { workspace = true }
async-graphql-actix-web  = { workspace = true }
dango-indexer-clickhouse = { workspace = true }
grug-types               = { workspace = true }
indexer-httpd            = { workspace = true, features = ["tracing"] }
indexer-sql              = { workspace = true }
metrics                  = { workspace = true, optional = true }
sentry-actix             = { workspace = true }
tokio                    = { workspace = true }
tracing                  = { workspace = true }
