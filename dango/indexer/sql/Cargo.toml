[package]
authors       = { workspace = true }
categories    = { workspace = true }
documentation = { workspace = true }
edition       = { workspace = true }
license       = { workspace = true }
name          = "dango-indexer-sql"
repository    = { workspace = true }
rust-version  = { workspace = true }
version       = { workspace = true }

[lib]
path = "src/lib.rs"

[features]
async-graphql        = ["dango-primitives/async-graphql", "dango-types/async-graphql", "dep:async-graphql"]
http-request-details = []
metrics              = ["dep:metrics"]
testing              = []
tracing              = ["dango-disk-saver/tracing", "dango-indexer-cache/tracing", "dep:tracing"]

[dependencies]
anyhow              = { workspace = true }
async-graphql       = { workspace = true, optional = true }
async-stream        = { workspace = true }
async-trait         = { workspace = true }
dango-app           = { workspace = true }
dango-backtrace     = { workspace = true }
dango-disk-saver    = { workspace = true }
dango-indexer-cache = { workspace = true }
dango-primitives    = { workspace = true, features = ["chrono", "sea-orm"] }
dango-types         = { workspace = true, features = ["sea-orm"] }
itertools           = { workspace = true }
metrics             = { workspace = true, optional = true }
sea-orm             = { workspace = true }
sea-orm-migration   = { workspace = true }
serde               = { workspace = true }
serde_json          = { workspace = true }
sqlx                = { workspace = true }
tempfile            = { workspace = true }
thiserror           = { workspace = true }
tokio               = { workspace = true, features = ["sync"] }
tokio-stream        = { workspace = true }
tracing             = { workspace = true, optional = true }
uuid                = { workspace = true }

[dev-dependencies]
assertor  = { workspace = true }
test-case = { workspace = true }
