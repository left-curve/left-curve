[package]
authors       = { workspace = true }
categories    = { workspace = true }
documentation = { workspace = true }
edition       = { workspace = true }
license       = { workspace = true }
name          = "dango-indexer-clickhouse"
repository    = { workspace = true }
rust-version  = { workspace = true }
version       = { workspace = true }

[features]
async-graphql = ["dango-types/async-graphql", "dep:async-graphql", "dango-primitives/async-graphql"]
metrics       = ["dep:metrics"]
testing       = ["clickhouse/test-util"]
tracing       = ["dep:tracing"]

[dependencies]
async-graphql    = { workspace = true, optional = true, features = ["bigdecimal"] }
bigdecimal       = { workspace = true }
chrono           = { workspace = true }
clickhouse       = { workspace = true, features = ["chrono", "inserter", "time", "uuid"] }
dango-order-book = { workspace = true }
dango-types      = { workspace = true }
dango-backtrace  = { workspace = true }
futures          = { workspace = true }
dango-app         = { workspace = true }
dango-math        = { workspace = true }
dango-primitives       = { workspace = true, features = ["chrono"] }
dango-indexer-sql      = { workspace = true }
itertools        = { workspace = true }
metrics          = { workspace = true, optional = true }
serde            = { workspace = true }
serde_json       = { workspace = true }
strum            = { workspace = true, features = ["derive"] }
strum_macros     = { workspace = true }
thiserror        = { workspace = true }
tokio            = { workspace = true }
tracing          = { workspace = true, optional = true }

[dev-dependencies]
assertor   = { workspace = true }
clickhouse = { workspace = true, features = ["test-util"] }
