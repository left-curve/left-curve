[package]
authors       = { workspace = true }
categories    = { workspace = true }
documentation = { workspace = true }
edition       = { workspace = true }
license       = { workspace = true }
name          = "dango-cli"
repository    = { workspace = true }
rust-version  = { workspace = true }
version       = "0.27.1"

[dependencies]
anyhow                      = { workspace = true }
clap                        = { workspace = true, features = ["derive", "wrap_help"] }
colored                     = { workspace = true }
dango-app                   = { workspace = true, features = ["abci", "metrics", "tracing"] }
dango-config-parser         = { workspace = true }
dango-db-disk               = { workspace = true, features = ["metrics", "tracing"] }
dango-genesis               = { workspace = true, features = ["metrics"] }
dango-indexer-cache         = { workspace = true, features = ["http-request-details", "metrics", "tracing"] }
dango-indexer-clickhouse    = { workspace = true, features = ["metrics", "tracing"] }
dango-indexer-hooked        = { workspace = true, features = ["tracing"] }
dango-indexer-httpd         = { workspace = true, features = ["metrics", "tracing"] }
dango-indexer-metrics       = { workspace = true, features = ["tracing"] }
dango-indexer-sql           = { workspace = true, features = ["async-graphql", "metrics", "tracing"] }
dango-primitives            = { workspace = true }
dango-proposal-preparer     = { workspace = true, features = ["metrics"] }
dango-upgrade               = { workspace = true }
dango-vm-rust               = { workspace = true }
dialoguer                   = { workspace = true }
home                        = { workspace = true }
libc                        = { workspace = true }
metrics                     = { workspace = true }
metrics-exporter-prometheus = { workspace = true }
opentelemetry               = { workspace = true }
opentelemetry-otlp          = { workspace = true }
opentelemetry_sdk           = { workspace = true }
sentry                      = { workspace = true }
serde                       = { workspace = true }
tokio                       = { workspace = true }
tower-abci                  = { workspace = true }
tracing                     = { workspace = true }
tracing-opentelemetry       = { workspace = true }
tracing-subscriber          = { workspace = true }

[[bin]]
name = "dango"
path = "src/main.rs"
