[package]
authors       = { workspace = true }
categories    = { workspace = true }
documentation = { workspace = true }
edition       = { workspace = true }
license       = { workspace = true }
name          = "dango-cli"
repository    = { workspace = true }
rust-version  = { workspace = true }
version       = "0.18.0"

[dependencies]
anyhow                      = { workspace = true }
clap                        = { workspace = true, features = ["derive", "wrap_help"] }
colored                     = { workspace = true }
config-parser               = { workspace = true }
dango-genesis               = { workspace = true, features = ["metrics"] }
dango-proposal-preparer     = { workspace = true, features = ["metrics"] }
dango-upgrade               = { workspace = true }
dialoguer                   = { workspace = true }
futures                     = { workspace = true }
grug-app                    = { workspace = true, features = ["abci", "metrics", "tracing"] }
grug-db-disk                = { workspace = true, features = ["metrics", "tracing"] }
grug-types                  = { workspace = true }
grug-vm-rust                = { workspace = true }
home                        = { workspace = true }
indexer-cache               = { workspace = true, features = ["http-request-details", "metrics", "s3", "tracing"] }
indexer-clickhouse          = { workspace = true, features = ["metrics", "tracing"] }
indexer-hooked              = { workspace = true, features = ["metrics", "tracing"] }
indexer-httpd               = { workspace = true, features = ["metrics", "tracing"] }
indexer-metrics             = { workspace = true, features = ["tracing"] }
indexer-sql                 = { workspace = true, features = ["async-graphql", "metrics", "tracing"] }
libc                        = { workspace = true }
metrics                     = { workspace = true }
metrics-exporter-prometheus = { workspace = true }
opentelemetry               = { workspace = true }
opentelemetry-otlp          = { workspace = true }
opentelemetry_sdk           = { workspace = true }
sentry                      = { workspace = true }
serde                       = { workspace = true }
tokio                       = { workspace = true }
tower                       = { workspace = true, features = ["full"] }
tower-abci                  = { workspace = true }
tracing                     = { workspace = true }
tracing-opentelemetry       = { workspace = true }
tracing-subscriber          = { workspace = true }

[[bin]]
name = "dango"
path = "src/main.rs"
