[package]
authors       = { workspace = true }
categories    = { workspace = true }
description   = "Rust SDK for interacting with a Dango node: GraphQL client, WebSocket subscriptions, key management, transaction signing"
documentation = { workspace = true }
edition       = { workspace = true }
license       = { workspace = true }
name          = "dango-sdk"
repository    = { workspace = true }
rust-version  = { workspace = true }
version       = { workspace = true }

[features]
tracing = ["dep:tracing"]

[dependencies]
aes-gcm                     = { workspace = true }
alloy                       = { workspace = true }
anyhow                      = { workspace = true }
async-trait                 = { workspace = true }
bip32                       = { workspace = true }
dango-auth                  = { workspace = true }
dango-backtrace             = { workspace = true }
dango-eth-utils             = { workspace = true }
dango-indexer-graphql-types = { workspace = true }
dango-primitives            = { workspace = true }
dango-types                 = { workspace = true }
futures                     = { workspace = true }
graphql_client              = { workspace = true }
k256                        = { workspace = true }
pbkdf2                      = { workspace = true }
reqwest                     = { workspace = true, features = ["json"] }
serde                       = { workspace = true }
serde_json                  = { workspace = true }
sha2                        = { workspace = true }
thiserror                   = { workspace = true }
tokio                       = { workspace = true }
tokio-tungstenite           = { workspace = true }
tracing                     = { workspace = true, optional = true }
url                         = { workspace = true }

[dev-dependencies]
csv                   = { workspace = true }
dango-account-factory = { workspace = true }
dango-math            = { workspace = true }
dango-order-book      = { workspace = true }
hex                   = { workspace = true }
tokio                 = { workspace = true }
