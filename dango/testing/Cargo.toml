[package]
authors       = { workspace = true }
categories    = { workspace = true }
documentation = { workspace = true }
edition       = { workspace = true }
license       = { workspace = true }
name          = "dango-testing"
repository    = { workspace = true }
rust-version  = { workspace = true }
version       = { workspace = true }

[dependencies]
actix-web                = { workspace = true }
anyhow                   = { workspace = true }
async-trait              = { workspace = true }
clickhouse               = { workspace = true, features = ["test-util"] }
dango-genesis            = { workspace = true }
dango-oracle             = { workspace = true }
dango-order-book         = { workspace = true }
dango-proposal-preparer  = { workspace = true }
dango-types              = { workspace = true, features = ["async-graphql"] }
grug-app                 = { workspace = true }
grug-db-disk             = { workspace = true }
grug-db-memory           = { workspace = true }
grug-math                = { workspace = true }
grug-testing             = { workspace = true }
grug-types               = { workspace = true, features = ["async-graphql"] }
grug-vm-rust             = { workspace = true }
hex-literal              = { workspace = true }
hyperlane-testing        = { workspace = true }
hyperlane-types          = { workspace = true }
identity                 = { workspace = true }
indexer-cache            = { workspace = true, features = ["metrics", "tracing"] }
indexer-clickhouse       = { workspace = true, features = ["metrics", "testing", "tracing"] }
indexer-hooked           = { workspace = true, features = ["tracing"] }
indexer-httpd            = { workspace = true, features = ["metrics"] }
indexer-metrics          = { workspace = true }
indexer-sql              = { workspace = true, features = ["async-graphql", "testing", "tracing"] }
k256                     = { workspace = true }
pyth-client              = { workspace = true }
pyth-types               = { workspace = true }
sea-orm                  = { workspace = true }
serde                    = { workspace = true }
sha2                     = { workspace = true }
temp-rocksdb             = { workspace = true }
tokio                    = { workspace = true }

[dev-dependencies]
anyhow                      = { workspace = true }
grug-storage                = { workspace = true }
assert-json-diff            = { workspace = true }
assertor                    = { workspace = true }
bip32                       = { workspace = true }
chrono                      = { workspace = true }
criterion                   = { workspace = true }
dango-account-factory       = { workspace = true }
dango-auth                  = { workspace = true }
dango-bank                  = { workspace = true }
dango-gateway               = { workspace = true }
dango-mock-httpd            = { workspace = true }
dango-taxman                = { workspace = true }
eth-utils                   = { workspace = true }
graphql_client              = { workspace = true }
hex                         = { workspace = true }
indexer-graphql-types       = { workspace = true }
indexer-testing             = { workspace = true }
itertools                   = { workspace = true }
metrics-exporter-prometheus = { workspace = true }
proptest                    = { workspace = true }
rand                        = { workspace = true }
reqwest                     = { workspace = true, features = ["json"] }
test-case                   = { workspace = true }
tokio                       = { workspace = true, features = ["full"] }
tracing                     = { workspace = true }

[[bench]]
harness = false
name    = "benchmarks"
