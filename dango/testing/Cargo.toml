criterion                   = { workspace = true }
dango-account-factory       = { workspace = true }
dango-auth                  = { workspace = true }
dango-backtrace             = { workspace = true }
dango-bank                  = { workspace = true }
dango-eth-utils             = { workspace = true }
dango-gateway               = { workspace = true }
dango-sdk                   = { workspace = true }
dango-storage               = { workspace = true }
dango-tester                = { workspace = true, features = ["library"] }
dango-vm-hybrid             = { workspace = true }
dango-vm-wasm               = { workspace = true }
