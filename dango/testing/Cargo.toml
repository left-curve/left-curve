dango-pyth-types            = { workspace = true }
dango-temp-rocksdb          = { workspace = true }
dango-types                 = { workspace = true, features = ["async-graphql"] }
dango-vm-rust               = { workspace = true }
futures                     = { workspace = true }
futures-util                = { workspace = true }
graphql_client              = { workspace = true }
hex-literal                 = { workspace = true }
k256                        = { workspace = true }
pyth-lazer-protocol         = { workspace = true }
rand                        = { workspace = true }
sea-orm                     = { workspace = true }
serde                       = { workspace = true }
serde_json                  = { workspace = true }
sha2                        = { workspace = true }
tokio                       = { workspace = true }
tracing                     = { workspace = true }
tracing-subscriber          = { workspace = true }

[dev-dependencies]
anyhow                      = { workspace = true }
assert-json-diff            = { workspace = true }
assertor                    = { workspace = true }
bip32                       = { workspace = true }
borsh                       = { workspace = true, features = ["de_strict_order", "derive"] }
