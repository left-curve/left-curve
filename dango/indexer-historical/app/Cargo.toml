[package]
authors       = { workspace = true }
categories    = { workspace = true }
documentation = { workspace = true }
edition       = { workspace = true }
license       = { workspace = true }
name          = "dango-indexer-historical-app"
repository    = { workspace = true }
rust-version  = { workspace = true }
version       = { workspace = true }

[lib]
path = "src/lib.rs"

[features]
default = ["metrics", "tracing"]
metrics = ["dep:metrics"]
tracing = ["dep:tracing"]

[dependencies]
anyhow                          = { workspace = true }
async-trait                     = { workspace = true }
chrono                          = { workspace = true }
clickhouse                      = { workspace = true }
futures                         = { workspace = true }
dango-indexer-historical-block-source = { workspace = true }
dango-indexer-historical-projection   = { workspace = true }
dango-indexer-historical-types        = { workspace = true }
metrics                         = { workspace = true, optional = true }
sea-orm                         = { workspace = true }
sea-orm-migration               = { workspace = true }
tokio                           = { workspace = true }
tracing                         = { workspace = true, optional = true }
