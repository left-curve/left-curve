[package]
authors       = { workspace = true }
categories    = { workspace = true }
documentation = { workspace = true }
edition       = { workspace = true }
license       = { workspace = true }
name          = "dango-indexer-historical-block-source"
repository    = { workspace = true }
rust-version  = { workspace = true }
version       = { workspace = true }

[lib]
path = "src/lib.rs"

[features]
default = ["metrics", "tracing"]
# Expose a `BlockLoader` (an async-graphql `DataLoader` over `BlockSource`) for
# read surfaces that hydrate raw payloads from blocks. Off by default: the
# source's core (fetch / store / subscribe) carries no GraphQL.
async-graphql = ["dep:async-graphql"]
metrics       = ["dep:metrics"]
tracing       = ["dep:tracing"]

[dependencies]
anyhow                   = { workspace = true }
async-graphql            = { workspace = true, optional = true }
async-trait              = { workspace = true }
borsh                    = { workspace = true }
futures                  = { workspace = true }
dango-graphql-ws-client        = { workspace = true }
dango-indexer-cache            = { workspace = true }
dango-indexer-graphql-types    = { workspace = true }
dango-indexer-historical-types = { workspace = true }
dango-primitives                = { workspace = true }
metrics                  = { workspace = true, optional = true }
rangemap                 = { workspace = true }
reqwest                  = { workspace = true }
rocksdb                  = { workspace = true }
serde                    = { workspace = true, features = ["derive"] }
serde_json               = { workspace = true }
tokio                    = { workspace = true }
tracing                  = { workspace = true, optional = true }
url                      = { workspace = true }

[dev-dependencies]
dango-temp-rocksdb = { workspace = true }
