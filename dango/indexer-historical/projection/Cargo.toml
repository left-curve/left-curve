[package]
authors       = { workspace = true }
categories    = { workspace = true }
documentation = { workspace = true }
edition       = { workspace = true }
license       = { workspace = true }
name          = "dango-indexer-historical-projection"
repository    = { workspace = true }
rust-version  = { workspace = true }
version       = { workspace = true }

[lib]
path = "src/lib.rs"

[features]
default = ["metrics", "tracing"]
metrics = ["dep:metrics"]
tracing = ["dep:tracing"]

[dependencies]
anyhow                   = { workspace = true }
async-graphql            = { workspace = true }
async-trait              = { workspace = true }
borsh                    = { workspace = true }
clickhouse               = { workspace = true }
futures                  = { workspace = true }
dango-primitives                      = { workspace = true, features = ["async-graphql", "chrono"] }
dango-indexer-historical-block-source = { workspace = true, features = ["async-graphql"] }
dango-indexer-historical-types        = { workspace = true }
metrics                  = { workspace = true, optional = true }
sea-orm                  = { workspace = true }
sea-orm-migration        = { workspace = true }
serde                    = { workspace = true, features = ["derive"] }
tracing                  = { workspace = true, optional = true }
zstd                     = { workspace = true }

[dev-dependencies]
serde_json = { workspace = true }
tokio      = { workspace = true }
uuid       = { workspace = true }
