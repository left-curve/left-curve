[package]
authors       = { workspace = true }
categories    = { workspace = true }
documentation = { workspace = true }
edition       = { workspace = true }
license       = { workspace = true }
name          = "dango-types"
repository    = { workspace = true }
rust-version  = { workspace = true }
version       = { workspace = true }

[features]
# Derive async-graphql traits for certain types.
async-graphql = ["dep:async-graphql"]
# Derive sea-orm traits for certain types.
sea-orm = ["dep:sea-orm"]

[dependencies]
anyhow                = { workspace = true }
async-graphql         = { workspace = true, optional = true }
async-trait           = { workspace = true }
dango-hyperlane-types = { workspace = true }
dango-math            = { workspace = true }
dango-order-book      = { workspace = true }
dango-primitives      = { workspace = true }
dango-pyth-types      = { workspace = true }
dango-storage         = { workspace = true }
sea-orm               = { workspace = true, optional = true }
serde                 = { workspace = true }
sha2                  = { workspace = true }
