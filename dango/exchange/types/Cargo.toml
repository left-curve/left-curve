[package]
authors       = { workspace = true }
categories    = { workspace = true }
documentation = { workspace = true }
edition       = { workspace = true }
license       = { workspace = true }
name          = "dango-types"
repository    = { workspace = true }
rust-version  = { workspace = true }
version       = { workspace = true }

[features]
# Derive async-graphql traits for certain types.
async-graphql = ["dep:async-graphql"]
# Derive sea-orm traits for certain types.
sea-orm = ["dep:sea-orm"]

[dependencies]
anyhow           = { workspace = true }
async-graphql    = { workspace = true, optional = true }
async-trait      = { workspace = true }
dango-order-book = { workspace = true }
grug-math        = { workspace = true }
grug-storage     = { workspace = true }
grug-types       = { workspace = true }
hyperlane-types  = { workspace = true }
pyth-types       = { workspace = true }
sea-orm          = { workspace = true, optional = true }
serde            = { workspace = true }
sha2             = { workspace = true }
