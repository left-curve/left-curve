- name: Prepare host for GitHub runners
  hosts: github_runners
  become: yes
  vars:
    sops_version: "3.13.1"
  roles:
    - rust
  tasks:
    - name: Install required packages
      apt:
        name:
          [
            curl,
            tar,
            pipx,
            python3,
            python3-pip,
            python3-clickhouse-driver,
            libatk1.0-0,
            libatk-bridge2.0-0,
            libatspi2.0-0,
            libxcomposite1,
            libxdamage1,
            libxfixes3,
            libxrandr2,
            libgbm1,
            libxkbcommon0,
            libasound2,
          ]
        update_cache: yes

    - name: Ensure '{{ runner_user }}' owns its home directory
      file:
        path: "/home/{{ runner_user }}"
        owner: "{{ runner_user }}"
        group: "{{ runner_user }}"
        recurse: yes

    - name: Adding runner user to group docker
      become: true
      user:
        name: "{{ runner_user }}"
        append: true
        groups:
          - docker

    - name: Install just CLI
      ansible.builtin.shell: |
        curl -sL https://just.systems/install.sh | bash -s -- --to /usr/local/bin
      args:
        creates: /usr/local/bin/just

    - name: Install SOPS CLI
      ansible.builtin.shell: |
        set -euo pipefail

        case "$(uname -m)" in
          x86_64|amd64) arch="amd64" ;;
          arm64|aarch64) arch="arm64" ;;
          *)
            echo "Unsupported architecture: $(uname -m)" >&2
            exit 1
            ;;
        esac

        asset="sops-v{{ sops_version }}.linux.${arch}"
        base_url="https://github.com/getsops/sops/releases/download/v{{ sops_version }}"
        tmp_dir="$(mktemp -d)"
        trap 'rm -rf "$tmp_dir"' EXIT

        curl -fsSL -o "$tmp_dir/$asset" "$base_url/$asset"
        curl -fsSL -o "$tmp_dir/checksums.txt" "$base_url/sops-v{{ sops_version }}.checksums.txt"
        checksum_line="$(awk -v asset="$asset" '$2 == asset { print $0 }' "$tmp_dir/checksums.txt")"
        if [ -z "$checksum_line" ]; then
          echo "Missing checksum for $asset" >&2
          exit 1
        fi
        (cd "$tmp_dir" && printf '%s\n' "$checksum_line" | sha256sum -c -)

        install -m 0755 "$tmp_dir/$asset" /usr/local/bin/sops
        /usr/local/bin/sops --version
      args:
        creates: /usr/local/bin/sops
        executable: /bin/bash

    - name: Install zizmor
      ansible.builtin.shell: |
        pipx install zizmor
      args:
        creates: /home/{{ runner_user }}/.local/bin/zizmor
      become: yes
      become_user: "{{ runner_user }}"
