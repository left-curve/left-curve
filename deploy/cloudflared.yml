- hosts: cloudflared
  become: true
  become_user: "{{ deploy_user }}"
  remote_user: debian
  vars_files:
    - vaults/debian/root_vault.yml
  vars:
    monitor_defs:
      - { name: "www",         path: "/",       expect: "200" }
      - { name: "api",         path: "/up",     expect: "200" }
      - { name: "faucet",      path: "/health", expect: "200" }
    # Services excluded from load balancer creation per network.
    # These get a direct tunnel CNAME on the host running the service.
    lb_exclude:
      mainnet:
        - faucet
      testnet:
        - faucet
  pre_tasks:
    - name: Get deploy user info
      getent:
        database: passwd
        key: "{{ deploy_user }}"

    - name: Set deploy_home fact
      set_fact:
        deploy_home: "{{ ansible_facts.getent_passwd[deploy_user][4] }}"
  roles:
    - cloudflared
