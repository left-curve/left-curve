---
# download-db.yml — Download Grug RocksDB (and optionally CometBFT data) to local
#
# Stops dango+cometbft for a consistent RocksDB snapshot, archives the data
# on the server, restarts the services immediately, then downloads the archive
# locally. This minimises downtime: the node is only stopped during the tar.
#
# Usage:
#   just download-db testnet              # interactive host selection
#   just download-db-testnet              # non-interactive (default host)
#
#   # Direct with custom options:
#   ansible-playbook download-db.yml \
#     -e dango_network=testnet \
#     -e target_host=100.90.163.19
#
# Variables:
#   dango_network    (required): devnet | testnet | mainnet
#   target_host      (optional): skip prompt and use this host IP directly
#   local_dest       (optional): local dir (default: ./downloaded-db/<network>/<hostname>)
#   include_cometbft (optional): also download CometBFT data (default: false)
#   stop_before      (optional): stop services for consistent snapshot (default: true)
#   restart_after    (optional): restart after download (default: true)

# ── Play 1: select target host ────────────────────────────────────────────────
- name: Select target host
  hosts: localhost
  connection: local
  gather_facts: false
  tasks:
    - name: Build host list for network
      set_fact:
        _network_hosts: >-
          {%- set result = [] -%}
          {%- for host in groups['full-app'] -%}
            {%- if dango_network in (hostvars[host]['dango_networks'] | default([])) -%}
              {%- set _ = result.append(host) -%}
            {%- endif -%}
          {%- endfor -%}
          {{ result }}
      when: target_host is not defined

    - name: Select host
      pause:
        prompt: >-
          {%- set ns = namespace(menu='') -%}
          {%- for host in _network_hosts -%}
            {%- set ns.menu = ns.menu ~ '\n  ' ~ loop.index ~ ') ' ~ hostvars[host]['hostname'] ~ ' (' ~ host ~ ')' -%}
          {%- endfor -%}
          Available hosts for {{ dango_network }}:{{ ns.menu }}

          Enter host number [1-{{ _network_hosts | length }}]
      register: _host_choice
      when: target_host is not defined

    - name: Set target from selection
      set_fact:
        _target_host: "{{ _network_hosts[_host_choice.user_input | int - 1] }}"
      when: target_host is not defined

    - name: Set target from extra var
      set_fact:
        _target_host: "{{ target_host }}"
      when: target_host is defined

    - name: Confirm selection
      debug:
        msg: "Selected: {{ hostvars[_target_host]['hostname'] }} ({{ _target_host }})"

# ── Play 2: archive and download ──────────────────────────────────────────────
- name: Download Grug RocksDB from remote
  hosts: "{{ hostvars['localhost']['_target_host'] }}"
  remote_user: "{{ deploy_user }}"
  gather_facts: yes
  vars:
    include_cometbft: false
    stop_before: true
    restart_after: true
    system_wide_directories: true
    reset_data: false
  vars_files:
    - roles/full-app/vars/main.yml
  tasks:
    # set_fact overrides role vars (which would reset system_wide_directories to false)
    - name: Pin system_wide_directories before role include
      set_fact:
        system_wide_directories: true
        reset_data: false

    - name: Read current deploy
      include_role:
        name: full-app
        tasks_from: read_current_deploy.yml

    - name: Set deployment_name
      set_fact:
        deployment_name: "{{ current_deployment }}"

    - name: Generate unique archive suffix
      set_fact:
        _archive_ts: "{{ lookup('pipe', 'date -u +%Y%m%d%H%M%S') }}"

    - name: Resolve local destination
      set_fact:
        _local_dest: "{{ local_dest | default(playbook_dir ~ '/downloaded-db/' ~ dango_network ~ '/' ~ hostname) }}"

    - name: Verify dango data directory exists
      stat:
        path: "{{ dango_directory }}/data"
      register: dango_data_stat

    - name: Abort if data directory missing
      fail:
        msg: "Dango data not found at {{ dango_directory }}/data"
      when: not dango_data_stat.stat.exists

    - name: Get dango data directory size
      command: du -sh {{ dango_directory }}/data
      register: dango_data_size

    - name: Get CometBFT data directory size
      command: du -sh {{ cometbft_directory }}/data
      register: cometbft_data_size
      when: include_cometbft | bool

    - name: Show download plan
      pause:
        seconds: 1
        prompt: |-
          Download plan:
            Network:       {{ dango_network }}
            Host:          {{ hostname }} ({{ inventory_hostname }})
            Deployment:    {{ deployment_name }}
            Dango data:    {{ dango_directory }}/data ({{ dango_data_size.stdout.split('\t')[0] }})
            CometBFT data: {{ cometbft_directory }}/data ({{ include_cometbft | bool | ternary(cometbft_data_size.stdout.split('\t')[0], 'excluded') }})
            Local dest:    {{ _local_dest }}
            Stop before:   {{ stop_before }}
            Restart after: {{ restart_after }}

    # Phase 1: stop, archive, restart (minimise downtime)
    - block:
        - name: Stop dango and cometbft
          community.docker.docker_compose_v2:
            project_name: "{{ deployment_name }}"
            project_src: "{{ deployment_dir }}"
            services: ["dango", "cometbft"]
            state: stopped
          when: stop_before | bool

        - name: Archive dango data
          command: tar czf {{ ansible_facts['env']['HOME'] }}/dango-data-{{ dango_network }}-{{ _archive_ts }}.tar.gz -C {{ dango_directory }} data

        - name: Get dango archive size
          command: du -sh {{ ansible_facts['env']['HOME'] }}/dango-data-{{ dango_network }}-{{ _archive_ts }}.tar.gz
          register: dango_archive_size

        - name: Archive CometBFT data
          command: tar czf {{ ansible_facts['env']['HOME'] }}/cometbft-data-{{ dango_network }}-{{ _archive_ts }}.tar.gz -C {{ cometbft_directory }} data
          when: include_cometbft | bool

        - name: Get CometBFT archive size
          command: du -sh {{ ansible_facts['env']['HOME'] }}/cometbft-data-{{ dango_network }}-{{ _archive_ts }}.tar.gz
          register: cometbft_archive_size
          when: include_cometbft | bool

      always:
        - name: Restart dango and cometbft
          community.docker.docker_compose_v2:
            project_name: "{{ deployment_name }}"
            project_src: "{{ deployment_dir }}"
            services: ["dango", "cometbft"]
            state: present
            recreate: always
            wait: false
          when: stop_before | bool and restart_after | bool

    # Phase 2: download archives locally (node is already back up)
    - name: Downloading archives
      pause:
        seconds: 1
        prompt: |-
          Downloading archives:
            - dango-data-{{ _archive_ts }}.tar.gz ({{ dango_archive_size.stdout.split('\t')[0] }})
          {% if include_cometbft | bool %}  - cometbft-data-{{ _archive_ts }}.tar.gz ({{ cometbft_archive_size.stdout.split('\t')[0] }}){% endif %}

    - name: Ensure local directory exists
      file:
        path: "{{ _local_dest }}"
        state: directory
      delegate_to: localhost
      become: false

    - name: Fetch dango archive
      fetch:
        src: "{{ ansible_facts['env']['HOME'] }}/dango-data-{{ dango_network }}-{{ _archive_ts }}.tar.gz"
        dest: "{{ _local_dest }}/dango-data-{{ _archive_ts }}.tar.gz"
        flat: true

    - name: Fetch CometBFT archive
      fetch:
        src: "{{ ansible_facts['env']['HOME'] }}/cometbft-data-{{ dango_network }}-{{ _archive_ts }}.tar.gz"
        dest: "{{ _local_dest }}/cometbft-data-{{ _archive_ts }}.tar.gz"
        flat: true
      when: include_cometbft | bool

    - name: Clean up remote archives
      file:
        path: "{{ item }}"
        state: absent
      loop:
        - "{{ ansible_facts['env']['HOME'] }}/dango-data-{{ dango_network }}-{{ _archive_ts }}.tar.gz"
        - "{{ ansible_facts['env']['HOME'] }}/cometbft-data-{{ dango_network }}-{{ _archive_ts }}.tar.gz"
      ignore_errors: true

    - name: Download complete
      pause:
        seconds: 1
        prompt: |-
          Download complete:
            {{ _local_dest }}/dango-data-{{ _archive_ts }}.tar.gz
          {% if include_cometbft | bool %}  {{ _local_dest }}/cometbft-data-{{ _archive_ts }}.tar.gz{% endif %}

          Extract: tar xzf {{ _local_dest }}/dango-data-{{ _archive_ts }}.tar.gz -C ~/.dango/
