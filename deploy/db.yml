- hosts: db
  remote_user: "{{ deploy_user }}"
  collections:
    - community.docker
  roles:
    - postgres

- hosts: db
  remote_user: debian
  become: true
  gather_facts: false
  vars_files:
    - roles/postgres/defaults/main.yml
  pre_tasks:
    - ansible.builtin.import_tasks: tasks/load-debian-root-secrets.yml
  tasks:
    - name: Install systemd unit for postgres compose
      template:
        src: roles/postgres/templates/postgres-compose.service.j2
        dest: /etc/systemd/system/postgres-compose.service
        mode: '0644'
      notify: Reload systemd

    - name: Enable and start postgres-compose service
      systemd:
        name: postgres-compose.service
        enabled: true
        state: started

    - name: Configure kernel parameters for memory optimization
      sysctl:
        name: "{{ item.key }}"
        value: "{{ item.value }}"
        state: present
        reload: yes
      loop:
        - { key: 'vm.swappiness', value: '1' }
        - { key: 'vm.vfs_cache_pressure', value: '50' }
      become: true
      become_user: root

  handlers:
    - name: Reload systemd
      systemd:
        daemon_reload: true
