- hosts: full-app
  remote_user: "{{ deploy_user }}"
  tasks:
    - name: Ensure b2 CLI is installed
      command: pipx install b2
      args:
        creates: "{{ ansible_facts['env']['HOME'] }}/.local/bin/b2"

    - name: List B2 buckets
      command: "{{ ansible_facts['env']['HOME'] }}/.local/bin/b2 bucket list"
      environment:
        B2_APPLICATION_KEY_ID: "{{ s3_master_access_key }}"
        B2_APPLICATION_KEY: "{{ s3_master_secret_key }}"
      register: b2_bucket_list
      run_once: true
      tags: [list]

    - name: Show B2 buckets
      debug:
        msg: "{{ b2_bucket_list.stdout }}"
      run_once: true
      tags: [list]

