- hosts: full-app
  remote_user: "{{ deploy_user }}"
  tasks:
    - name: Ensure b2 CLI is installed
      command: pipx install b2
      args:
        creates: "{{ ansible_facts['env']['HOME'] }}/.local/bin/b2"

    - name: List B2 buckets
      command: "{{ ansible_facts['env']['HOME'] }}/.local/bin/b2 bucket list"
      environment:
        B2_APPLICATION_KEY_ID: "{{ s3_master_access_key }}"
        B2_APPLICATION_KEY: "{{ s3_master_secret_key }}"
      register: b2_bucket_list
      run_once: true
      tags: [list]

    - name: Show B2 buckets
      debug:
        msg: "{{ b2_bucket_list.stdout }}"
      run_once: true
      tags: [list]

    - name: Ensure delete script exists
      copy:
        src: roles/full-app/files/delete_b2_buckets2.sh
        dest: "{{ ansible_facts['env']['HOME'] }}/delete_b2_buckets2.sh"
        mode: '0755'
      tags: [cleanup]

    - name: Run B2 bucket cleanup
      command: "{{ ansible_facts['env']['HOME'] }}/delete_b2_buckets2.sh"
      environment:
        B2_APPLICATION_KEY_ID: "{{ s3_master_access_key }}"
        B2_APPLICATION_KEY: "{{ s3_master_secret_key }}"
      register: b2_cleanup_result
      run_once: true
      tags: [cleanup]

    - name: Show cleanup output
      debug:
        msg: "{{ b2_cleanup_result.stdout_lines }}"
      run_once: true
      tags: [cleanup]

    - name: Reject deletion of testnet/mainnet buckets
      assert:
        that:
          - "'testnet' not in b2_bucket"
          - "'mainnet' not in b2_bucket"
        fail_msg: "Refusing to delete bucket '{{ b2_bucket }}' — testnet/mainnet buckets are protected"
      run_once: true
      tags: [delete-bucket]

    - name: Would delete specific B2 bucket (dry run)
      debug:
        msg: "WOULD DELETE bucket '{{ b2_bucket }}'"
      run_once: true
      tags: [delete-bucket]

