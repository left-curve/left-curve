---
- hosts: archive
  become: true
  become_user: "{{ deploy_user }}"
  remote_user: deploy
  collections:
    - community.docker
  pre_tasks:
    - name: Get deploy user info
      getent:
        database: passwd
        key: "{{ deploy_user }}"
    - name: Set deploy_home fact
      set_fact:
        deploy_home: "{{ ansible_facts.getent_passwd[deploy_user][4] }}"
  tasks:
    - name: Stop archive instances
      include_role:
        name: archive
        tasks_from: stop-instance.yml
      loop: "{{ archive_instances }}"
      loop_control:
        loop_var: instance
        label: "{{ instance.name }}"
