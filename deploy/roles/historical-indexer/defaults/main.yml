---
historical_indexer_dir: "{{ deploy_home }}/historical-indexer"
historical_indexer_image: "ghcr.io/left-curve/left-curve/indexer-historical"
historical_indexer_tag: "latest"

# Instances to run on this host. Each runs as its own docker compose project
# (own directory, container, RocksDB data dir, and Postgres database) and is
# reachable through Traefik at historical-<name>.<dango_domain>. Multiple
# instances coexist on one host as long as each has a unique name and a unique
# metrics_host_port. Populated from host_vars / passed via -e at deploy time.
#
# Example:
#   historical_indexer_instances:
#     - name: testnet
#       live_url: "http://<testnet-node-tailscale-ip>:8080"
#       metrics_host_port: 9191
#     - name: mainnet
#       live_url: "http://<mainnet-node-tailscale-ip>:8080"
#       metrics_host_port: 9192
historical_indexer_instances: []

# Postgres connection — the shared host postgres, reached by the container over
# the `postgres` external docker network (same pattern as referral-dashboard /
# metabase). The per-instance database and user are derived from the instance
# name: db == user == "indexer_historical_<name>".
historical_indexer_db_host: "postgres"
historical_indexer_db_port: 5432
# historical_indexer_db_password: ""  # required, from
# group_vars/historical-indexer/vault.sops.json (SOPS)

# Superuser used to provision the per-instance database/user on the shared
# postgres (login over localhost, not the container network).
postgres_external_host: "127.0.0.1"
postgres_port: 5432
