---
# Drops only the Postgres projection database (cursors + activity tables). The
# RocksDB block store under <instance_dir>/data is deliberately left in place —
# blocks are re-fetchable cache, and keeping them lets the projection rebuild
# without a full re-backfill. To wipe everything, also delete that data dir.
- name: "{{ instance.name }} - Derive instance facts"
  set_fact:
    hi_instance_dir: "{{ historical_indexer_dir }}/{{ instance.name }}"
    hi_db_name: "indexer_historical_{{ instance.name | replace('-', '_') }}"
    hi_db_user: "indexer_historical_{{ instance.name | replace('-', '_') }}"

- name: "{{ instance.name }} - Validate required variables"
  assert:
    that:
      - postgres_user is defined
      - postgres_password is defined
    fail_msg: "drop-db requires postgres_user and postgres_password"

- name: "{{ instance.name }} - Stop stack"
  community.docker.docker_compose_v2:
    project_src: "{{ hi_instance_dir }}"
    state: stopped
    pull: never

- name: "{{ instance.name }} - Drop postgres database"
  community.postgresql.postgresql_db:
    name: "{{ hi_db_name }}"
    login_user: "{{ postgres_user }}"
    login_password: "{{ postgres_password }}"
    login_host: "{{ postgres_external_host }}"
    login_port: "{{ postgres_port }}"
    state: absent

- name: "{{ instance.name }} - Recreate empty postgres database"
  community.postgresql.postgresql_db:
    name: "{{ hi_db_name }}"
    owner: "{{ hi_db_user }}"
    login_user: "{{ postgres_user }}"
    login_password: "{{ postgres_password }}"
    login_host: "{{ postgres_external_host }}"
    login_port: "{{ postgres_port }}"
    state: present

- name: "{{ instance.name }} - Grant privileges on database"
  community.postgresql.postgresql_privs:
    type: database
    privs: ALL
    roles: "{{ hi_db_user }}"
    login_db: "{{ hi_db_name }}"
    login_user: "{{ postgres_user }}"
    login_password: "{{ postgres_password }}"
    login_host: "{{ postgres_external_host }}"
    login_port: "{{ postgres_port }}"
    state: present
