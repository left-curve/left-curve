groups:
- name: instance-alerts
  rules:
  - alert: MetricsUnavailable
    expr: up{environment!="preview"} == 0
    for: 10m
    labels:
      severity: critical
    annotations:
      summary: "Prometheus metrics {{ $labels.instance }} down"
      description: "{{ $labels.instance }} of {{ $labels.job }} has been down for more than 10 minutes."

  - alert: HighCpuLoad
    expr: 100 - (avg by(instance) (irate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
    for: 5m
    labels:
      severity: warning
    annotations:
      summary: "High CPU load on instance {{ $labels.instance }}"
      description: "{{ $labels.instance }} has CPU load above 80% for more than 5 minutes."

  - alert: HighMemoryUsage
    expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 95
    for: 5m
    labels:
      severity: warning
    annotations:
      summary: "High memory usage on instance {{ $labels.instance }}"
      description: "{{ $labels.instance }} has memory usage above 85% for more than 5 minutes."

  - alert: DiskSpaceLow
    expr: (1 - (node_filesystem_avail_bytes{fstype!="tmpfs"} / node_filesystem_size_bytes{fstype!="tmpfs"})) * 100 > 90
    for: 5m
    labels:
      severity: critical
    annotations:
      summary: "Disk space low on instance {{ $labels.instance }}"
      description: "{{ $labels.instance }} has less than 10% disk space available on {{ $labels.mountpoint }}."

- name: application-alerts
  rules:
  # This is now done through uptimekuma -> Discord
  # - alert: DangoServiceDown
  #   expr: up{job="dango", environment!="preview"} == 0
  #   for: 1m
  #   labels:
  #     severity: critical
  #   annotations:
  #     summary: "Dango service is down on {{ $labels.instance }} ({{ $labels.dango_network }})"
  #     description: "Dango service has been down for more than 1 minute."

  # This is now done through uptimekuma -> Discord
  # - alert: CometBFTServiceDown
  #   expr: up{job="cometbft", environment!="preview"} == 0
  #   for: 1m
  #   labels:
  #     severity: critical
  #   annotations:
  #     summary: "CometBFT service is down on {{ $labels.instance }} ({{ $labels.dango_network }})"
  #     description: "CometBFT service has been down for more than 1 minute."

  - alert: HighErrorRate
    expr: rate(http_requests_total{status=~"5.."}[5m]) > 0.1
    for: 5m
    labels:
      severity: warning
    annotations:
      summary: "High error rate detected"
      description: "Error rate is above 10% for more than 5 minutes."

- name: cloudflare-alerts
  rules:
  - alert: CloudflaredDown
    expr: up{job="cloudflared"} == 0
    for: 5m
    labels:
      severity: critical
    annotations:
      summary: "Cloudflared metrics down on {{ $labels.instance }}"
      description: "Prometheus has not been able to scrape cloudflared on {{ $labels.instance }} for more than 5 minutes."

  - alert: CloudflaredTunnelRequestErrors
    expr: sum by(instance, dango_network) (increase(cloudflared_tunnel_request_errors[5m])) > 0
    for: 2m
    labels:
      severity: warning
    annotations:
      summary: "Cloudflared request errors on {{ $labels.instance }}"
      description: "cloudflared reported origin proxy errors on {{ $labels.instance }} over the last 5 minutes."

  - alert: CloudflaredTunnelDegraded
    expr: min by(instance, dango_network) (cloudflared_tunnel_ha_connections) < 4
    for: 5m
    labels:
      severity: warning
    annotations:
      summary: "Cloudflared HA connections degraded on {{ $labels.instance }}"
      description: "cloudflared has fewer than 4 active HA connections on {{ $labels.instance }} for more than 5 minutes."

  - alert: CloudflareEdgeObserverDown
    expr: up{job="cloudflare-edge-observer"} == 0
    for: 5m
    labels:
      severity: warning
    annotations:
      summary: "Cloudflare edge observer is down"
      description: "Prometheus has not been able to scrape the Cloudflare edge observer for more than 5 minutes."

  - alert: CloudflareEdgeObserverPollErrors
    expr: increase(cloudflare_edge_observer_poll_errors_total[10m]) > 0
    for: 5m
    labels:
      severity: warning
    annotations:
      summary: "Cloudflare edge observer polling errors"
      description: "The Cloudflare edge observer has failed one or more Cloudflare API polls in the last 10 minutes."
