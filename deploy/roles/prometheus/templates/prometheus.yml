global:
  scrape_interval: 30s
  evaluation_interval: 1m

rule_files:
  - "alert-rules.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets:
          - alertmanager:9093

remote_write:
  - url: http://victoriametrics:8428/api/v1/write
    queue_config:
      max_samples_per_send: 10000
      batch_send_deadline: 5s

scrape_configs:
  - job_name: 'loki'
    static_configs:
      - targets: ['loki:3100']

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'traefik'
    static_configs:
      - targets: ['ovh1:8888']
      - targets: ['ovh2:8888']
      - targets: ['ovh3:8888']
      - targets: ['hetzner1:8888']
      - targets: ['hetzner2:8888']
      - targets: ['hetzner3:8888']
      - targets: ['hetzner4:8888']
      - targets: ['hetzner5:8888']
      - targets: ['hetzner6:8888']

  - job_name: 'cloudflared'
    static_configs:
{% for host in groups['cloudflared'] | default([]) %}
{%   set hn = hostvars[host].hostname | default(host) %}
{%   set networks = hostvars[host].dango_networks | default([]) %}
{%   set metrics_enabled = hostvars[host].cloudflared_metrics_enabled | default('mainnet' not in networks) %}
{%   if metrics_enabled %}
      - targets: ['{{ hn }}:{{ cloudflared_metrics_port | default(2000) }}']
        labels:
          service: 'cloudflared'
          environment: 'production'
          network: '{{ networks | join(",") if (networks | length > 0) else "system" }}'
          dango_network: '{{ networks | join(",") if (networks | length > 0) else "system" }}'
          cloudflare_lb_enabled: '{{ (hostvars[host].cloudflare_lb_enabled | default(false)) | string | lower }}'
{%   endif %}
{% endfor %}

  - job_name: 'cloudflare-edge-observer'
    static_configs:
      - targets: ['cloudflare-edge-observer:{{ cloudflare_edge_observer_port | default(9210) }}']
        labels:
          service: 'cloudflare-edge-observer'
          environment: 'production'
          network: 'system'
          dango_network: 'system'

  - job_name: 'alertmanager'
    static_configs:
      - targets: ['alertmanager:9093']

  - job_name: 'grafana'
    static_configs:
      - targets: ['grafana:{{ grafana_port | default(3000) }}']

  - job_name: 'node-exporter'
    static_configs:
      - targets:
        - 'ovh1:9100'
        - 'ovh2:9100'
        - 'node-exporter:9100' # self
        - 'ovh4:9100'
        - 'ovh5:9100'
        - 'ovh6:9100'
        - 'ovh7:9100'
        - 'hetzner1:9100'
        - 'hetzner2:9100'
        - 'hetzner3:9100'
        - 'hetzner4:9100'
        - 'hetzner5:9100'
        - 'hetzner6:9100'
    relabel_configs:
    - source_labels: [__address__]
      regex: 'node-exporter:9100'
      target_label: instance
      replacement: 'ovh3:9100'

  - job_name: 'cadvisor'
    static_configs:
      - targets:
        - 'ovh1:9101'
        - 'ovh2:9101'
        - 'cadvisor:8080' # self (ovh3)
        - 'ovh4:9101'
        - 'ovh5:9101'
        - 'ovh6:9101'
        - 'ovh7:9101'
        - 'hetzner1:9101'
        - 'hetzner2:9101'
        - 'hetzner3:9101'
        - 'hetzner4:9101'
        - 'hetzner5:9101'
        - 'hetzner6:9101'
    relabel_configs:
    - source_labels: [__address__]
      regex: 'cadvisor:8080'
      target_label: instance
      replacement: 'ovh3:9101'
    metric_relabel_configs:
    - source_labels: [container_label_com_docker_compose_project]
      regex: '.*devnet.*'
      target_label: network
      replacement: 'devnet'
    - source_labels: [container_label_com_docker_compose_project]
      regex: '.*testnet.*'
      target_label: network
      replacement: 'testnet'
    - source_labels: [container_label_com_docker_compose_project]
      regex: '.*mainnet.*'
      target_label: network
      replacement: 'mainnet'
    - source_labels: [container_label_com_docker_compose_project]
      regex: '(pr-.*)'
      target_label: network
      replacement: '$1'

  - job_name: 'tempo'
    static_configs:
      - targets: ['tempo:3200']
    relabel_configs:
    - source_labels: [__address__]
      regex: 'tempo:3200'
      target_label: instance
      replacement: 'ovh3:3200'

