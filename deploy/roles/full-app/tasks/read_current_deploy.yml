- block:
    - name: Check file
      stat:
        path: "{{ ansible_facts['env']['HOME'] }}/deployments/{{ dango_network }}.json"
      register: traefik_json

    - name: Read current traefik deployment
      slurp:
        src: "{{ traefik_json.stat.path }}"
      register: current_deployment_raw
      when: traefik_json.stat.exists

    - name: Parse current traefik deployment
      set_fact:
        current_deployment: "{{ (current_deployment_raw.content | b64decode | from_json).current_deployment }}"
      when: traefik_json.stat.exists and current_deployment_raw is defined

    - name: Check if deployment already exists
      stat:
        path: "{{ ansible_facts['env']['HOME'] }}/deployments/{{ current_deployment }}/.env"
      register: env_file_exists
      when: current_deployment is defined

    - debug:
        msg: "Current existing deployment is {{ current_deployment }} and env file exists: {{ env_file_exists.stat.exists }}"
      when: current_deployment is defined

    - name: Read .env values for database names
      shell: |
        grep -E '^(POSTGRES_DATABASE|CLICKHOUSE_DATABASE)=' {{ ansible_facts['env']['HOME'] }}/deployments/{{ current_deployment }}/.env | \
        awk -F= '{print tolower($1) "=" $2}'
      register: existing_env_variables
      when: current_deployment is defined and env_file_exists.stat.exists

    - name: Set facts from existing .env
      set_fact:
        "{{ item.split('=')[0] }}": "{{ item.split('=')[1] }}"
      loop: "{{ existing_env_variables.stdout_lines }}"
      when: current_deployment is defined and env_file_exists.stat.exists

    # Reuse the existing deployment's data dirs and S3 bucket/path so they stay
    # stable across redeploys (overrides the fresh-timestamp defaults set in
    # full-app.yml / prep_after_lock.yml). This is why testnet/mainnet keep a
    # single persistent S3 bucket instead of a new one per deploy.
    - name: Read .env values for system wide directories
      shell: |
        grep -E '^(DANGO_DIRECTORY|COMETBFT_DIRECTORY|S3_PATH|S3_BUCKET)=' {{ ansible_facts['env']['HOME'] }}/deployments/{{ current_deployment }}/.env | \
        awk -F= '{print tolower($1) "=" $2}'
      register: existing_env_variables
      when: system_wide_directories and current_deployment is defined and env_file_exists.stat.exists

    - name: Set facts from existing .env
      set_fact:
        "{{ item.split('=')[0] }}": "{{ item.split('=')[1] }}"
      loop: "{{ existing_env_variables.stdout_lines }}"
      when: system_wide_directories and current_deployment is defined and env_file_exists.stat.exists

  when: not reset_data
