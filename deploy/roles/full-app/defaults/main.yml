---
dex_bot_host: "{{ ansible_play_hosts_all | first }}"
perps_bot_host: "{{ ansible_play_hosts_all | first }}"
perp_liquidator_host: "{{ ansible_play_hosts_all | first }}"

# Per-network non-secret configuration for perp-liquidator
perp_liquidator_config:
  devnet:
    name: "liquidator-devnet"
    http_url: "http://dango:8080"
    liquidation_cooldown: 20
    liquidation_delay_blocks: 0
    event_driven: "true"
    query_timeout: 1
    query_timeout_heavy: 5
    http_port: 9310
    notification_timeout: 10
    frontend_url: "https://dev.dango.exchange"
  testnet:
    name: "liquidator-testnet"
    http_url: "http://dango:8080"
    liquidation_cooldown: 20
    liquidation_delay_blocks: 0
    event_driven: "true"
    query_timeout: 1
    query_timeout_heavy: 5
    http_port: 9310
    notification_timeout: 10
    frontend_url: "https://test.dango.exchange"
  mainnet:
    name: "liquidator-mainnet"
    http_url: "http://dango:8080"
    liquidation_cooldown: 5
    liquidation_delay_blocks: 0
    event_driven: "true"
    query_timeout: 1
    query_timeout_heavy: 5
    http_port: 9310
    notification_timeout: 10
    frontend_url: "https://dango.exchange"
  previewnet:
    name: "liquidator-previewnet"
    http_url: "http://dango:8080"
    liquidation_cooldown: 20
    liquidation_delay_blocks: 0
    event_driven: "true"
    query_timeout: 1
    query_timeout_heavy: 5
    http_port: 9310
    notification_timeout: 10
    frontend_url: ""

perp_liquidator_http_port: 9310
postgres_host: "postgres"
postgres_external_host: "127.0.0.1"
postgres_port: 5432
clickhouse_http_port: 8123
clickhouse_tcp_port: 9000
clickhouse_host: "clickhouse"
clickhouse_external_host: "127.0.0.1"
frontend_banner: ""
frontend_enabled_features: ""
cosign_certificate_oidc_issuer: "https://token.actions.githubusercontent.com"
verify_signatures: true
# Per-image signature verification flags (default to true for backwards compatibility)
verify_backend_signature: true
verify_frontend_signature: true
deploy_lock_threshold_seconds: 600
