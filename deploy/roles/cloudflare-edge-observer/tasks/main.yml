---
- name: Ensure Cloudflare edge observer directories exist
  file:
    path: "{{ cloudflare_edge_observer_dir }}/{{ item }}"
    state: directory
    mode: "0755"
  loop: ["config", "data"]

- name: Copy Cloudflare edge observer files
  become: true
  become_user: root
  block:
    - template:
        src: "{{ item.src }}"
        dest: "{{ item.dest }}"
        owner: "{{ deploy_user }}"
        mode: "{{ item.mode }}"
      loop:
        - { src: "{{ playbook_dir }}/roles/cloudflare-edge-observer/templates/docker-compose.yml", dest: "{{ cloudflare_edge_observer_dir }}/docker-compose.yml", mode: "0644" }
        - { src: "{{ playbook_dir }}/roles/cloudflare-edge-observer/templates/config.json.j2", dest: "{{ cloudflare_edge_observer_dir }}/config/config.json", mode: "0644" }
        - { src: "{{ playbook_dir }}/roles/cloudflare-edge-observer/templates/env.j2", dest: "{{ cloudflare_edge_observer_dir }}/.env", mode: "0600" }
    - copy:
        src: "{{ playbook_dir }}/roles/cloudflare-edge-observer/files/cloudflare_edge_observer.py"
        dest: "{{ cloudflare_edge_observer_dir }}/cloudflare_edge_observer.py"
        owner: "{{ deploy_user }}"
        mode: "0755"

- name: Launch Cloudflare edge observer
  community.docker.docker_compose_v2:
    project_src: "{{ cloudflare_edge_observer_dir }}"
    pull: missing
    state: present
    recreate: always

- name: Install systemd unit for Cloudflare edge observer compose
  become: true
  become_user: root
  template:
    src: cloudflare-edge-observer-compose.service.j2
    dest: /etc/systemd/system/cloudflare-edge-observer-compose.service
    mode: "0644"
  notify: Reload systemd

- name: Enable and start Cloudflare edge observer compose service
  become: true
  become_user: root
  systemd:
    name: cloudflare-edge-observer-compose.service
    enabled: true
    state: started
