protocol: quic
edge-ip-version: auto
ha-connections: 12
transport-loglevel: warn

originRequest:
  connectTimeout: 2s
  keepAliveTimeout: 5s
  keepAliveConnections: 16

ingress:
{% for dango_network in dango_networks %}
  - hostname: api-{{ dango_network }}-{{ hostname }}.{{ dango_domain }}
    service: http://traefik
  - hostname: graphiql-{{ dango_network }}-{{ hostname }}.{{ dango_domain }}
    service: http://traefik
  - hostname: www-{{ dango_network }}-{{ hostname }}.{{ dango_domain }}
    service: http://traefik
  - hostname: faucet-{{ dango_network }}-{{ hostname }}.{{ dango_domain }}
    service: http://traefik
# for devnet, we use a CNAME to the host without using a LB
  - hostname: api-{{ dango_network }}.{{ dango_domain }}
    service: http://traefik
  - hostname: graphiql-{{ dango_network }}.{{ dango_domain }}
    service: http://traefik
  - hostname: www-{{ dango_network }}.{{ dango_domain }}
    service: http://traefik
  - hostname: faucet-{{ dango_network }}.{{ dango_domain }}
    service: http://traefik
  - hostname: points-{{ dango_network }}.{{ dango_domain }}
    service: http://traefik
{% endfor %}
  - service: http_status:404
