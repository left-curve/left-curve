[package]
authors       = { workspace = true }
categories    = { workspace = true }
documentation = { workspace = true }
edition       = { workspace = true }
license       = { workspace = true }
name          = "indexer-sql"
repository    = { workspace = true }
rust-version  = { workspace = true }
version       = { workspace = true }

[lib]
path = "src/lib.rs"

[features]
async-graphql        = ["dep:async-graphql", "dango-types/async-graphql", "grug-types/async-graphql"]
http-request-details = []
metrics              = ["dep:metrics"]
testing              = []
tracing              = ["dep:tracing", "disk-saver/tracing", "indexer-cache/tracing"]

[dependencies]
anyhow             = { workspace = true }
async-graphql      = { workspace = true, optional = true }
async-stream       = { workspace = true }
async-trait        = { workspace = true }
dango-types        = { workspace = true, features = ["sea-orm"] }
disk-saver         = { workspace = true }
error-backtrace    = { workspace = true }
grug               = { workspace = true }
grug-app           = { workspace = true }
grug-types         = { workspace = true, features = ["chrono", "sea-orm"] }
indexer-cache      = { workspace = true }
itertools          = { workspace = true }
metrics            = { workspace = true, optional = true }
sea-orm            = { workspace = true }
sea-orm-migration  = { workspace = true }
serde              = { workspace = true }
serde_json         = { workspace = true }
sqlx               = { workspace = true }
tempfile           = { workspace = true }
thiserror          = { workspace = true }
tokio              = { workspace = true, features = ["sync"] }
tokio-stream       = { workspace = true }
tracing            = { workspace = true, optional = true }
uuid               = { workspace = true }

[dev-dependencies]
assertor  = { workspace = true }
test-case = { workspace = true }
