[package]
authors       = { workspace = true }
categories    = { workspace = true }
documentation = { workspace = true }
edition       = { workspace = true }
license       = { workspace = true }
name          = "indexer-httpd"
repository    = { workspace = true }
rust-version  = { workspace = true }
version       = { workspace = true }

[lib]
path = "src/lib.rs"

[features]
metrics = [
  "dep:actix-web-metrics",
  "dep:metrics",
  "grug-httpd/metrics",
]
tracing = ["dep:tracing", "grug-app/tracing", "indexer-sql/tracing"]

[dependencies]
actix-web         = { workspace = true }
actix-web-metrics = { workspace = true, optional = true }
anyhow            = { workspace = true }
async-trait       = { workspace = true }
chrono            = { workspace = true }
error-backtrace   = { workspace = true }
futures-util      = { workspace = true }
grug-app          = { workspace = true }
grug-httpd        = { workspace = true }
grug-types        = { workspace = true, features = ["chrono", "tendermint"] }
indexer-cache     = { workspace = true }
indexer-sql       = { workspace = true }
metrics           = { workspace = true, optional = true }
num_cpus          = { workspace = true }
sea-orm           = { workspace = true }
sentry            = { workspace = true }
serde             = { workspace = true }
tendermint        = { workspace = true }
tendermint-rpc    = { workspace = true, features = ["http-client"] }
thiserror         = { workspace = true }
tracing           = { workspace = true, optional = true }
