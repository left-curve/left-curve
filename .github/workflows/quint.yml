name: Quint

permissions: {}

on:
  push:
    branches:
      - main
    paths:
      - "dango/core/jellyfish-merkle/spec/**"
  pull_request:
    paths:
      - "dango/core/jellyfish-merkle/spec/**"

jobs:
  lmt-check:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./dango/core/jellyfish-merkle/spec
    steps:
      # Step 1: Checkout the repository
      - name: Checkout code
        uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744 # v3
        with:
          persist-credentials: false

      # Step 2: Install Go
      - name: Install Go
        uses: actions/setup-go@7b8cf10d4e4a01d4992d18a89f4d7dc5a3e6d6f4 # v4
        with:
          go-version: '1.20' # Replace with the required Go version

      # Step 3: Clone and build `lmt`
      - name: Build LMT
        run: |
          go install github.com/driusan/lmt@latest
          export PATH=$PATH:$(go env GOPATH)/bin

      # Step 4: Run `lmt` and fail if differences are detected
      - name: Run LMT
        run: |
          lmt docs/proofs.md
          lmt docs/invariants.md
          lmt docs/tree_manipulation.md
          lmt docs/grug_ics23.md
          lmt docs/proof_types.md
          # Check that it is up to date
          git diff --exit-code \
            || ( echo ">>> ERROR: Tangled files are out of sync." &&  exit 1)

  quint-typecheck:
    name: Typecheck
    permissions:
      contents: read
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./dango/core/jellyfish-merkle/spec
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
        with:
          version: 10.16.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24"
      # Pinned to 0.30.0: quint 0.31.0 switched the default `quint test`/`run` backend to
      # Rust (informalsystems/quint#1919), which miscomputes the unchanged JMT spec and
      # fails `bigInsertionUpdateDeleteTest`; 0.30.0's TypeScript backend passes. Keep pinned.
      - name: Install Quint
        working-directory: ${{ github.workspace }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pnpm --filter @left-curve/jellyfish-merkle-spec install --frozen-lockfile
          echo "$GITHUB_WORKSPACE/node_modules/.bin" >> "$GITHUB_PATH"
      - run: bash scripts/quint-forall.sh typecheck quint/**/*.qnt

  quint-test:
    name: Test
    permissions:
      contents: read
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./dango/core/jellyfish-merkle/spec
    env:
      MAX_SAMPLES: 100
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
        with:
          version: 10.16.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24"
      # Pinned to 0.30.0: quint 0.31.0 switched the default `quint test`/`run` backend to
      # Rust (informalsystems/quint#1919), which miscomputes the unchanged JMT spec and
      # fails `bigInsertionUpdateDeleteTest`; 0.30.0's TypeScript backend passes. Keep pinned.
      - name: Install Quint
        working-directory: ${{ github.workspace }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pnpm --filter @left-curve/jellyfish-merkle-spec install --frozen-lockfile
          echo "$GITHUB_WORKSPACE/node_modules/.bin" >> "$GITHUB_PATH"
      - run: quint test --max-samples=$MAX_SAMPLES quint/test/test_all.qnt

  quint-simulations-fancy:
    name: Simulate fancy
    permissions:
      contents: read
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./dango/core/jellyfish-merkle/spec/quint
    env:
      MAX_SAMPLES: 100
      MAX_STEPS: 3
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.3.0
        with:
          version: 10.16.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "24"
      # Pinned to 0.30.0: quint 0.31.0 switched the default `quint test`/`run` backend to
      # Rust (informalsystems/quint#1919), which miscomputes the unchanged JMT spec and
      # fails `bigInsertionUpdateDeleteTest`; 0.30.0's TypeScript backend passes. Keep pinned.
      - name: Install Quint
        working-directory: ${{ github.workspace }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pnpm --filter @left-curve/jellyfish-merkle-spec install --frozen-lockfile
          echo "$GITHUB_WORKSPACE/node_modules/.bin" >> "$GITHUB_PATH"
      - run: quint run --max-samples=$MAX_SAMPLES --max-steps=$MAX_STEPS --invariant=allInvariants --step=step_fancy apply_state_machine.qnt

