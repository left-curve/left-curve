name: Cleanup Stale PR Deployments

permissions: {}

on:
  schedule:
    # every day at 5am UTC (offset from GHCR@3am, B2@4am)
    - cron: '0 5 * * *'
  workflow_dispatch:

jobs:
  discover:
    runs-on: [self-hosted]
    environment: deploy
    permissions:
      contents: read
    outputs:
      pr_numbers: ${{ steps.find.outputs.pr_numbers }}
      has_stale: ${{ steps.find.outputs.has_stale }}

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Install Ansible
        run: |
          pipx install ansible
          echo "${HOME}/.local/bin" >> $GITHUB_PATH
          ln -sf ~/.local/pipx/venvs/ansible/bin/ansible-galaxy ~/.local/bin/ansible-galaxy
          ln -sf ~/.local/pipx/venvs/ansible/bin/ansible-playbook ~/.local/bin/ansible-playbook

      - name: Install collections
        run: |
          ansible-galaxy collection install -r deploy/requirements.yml

      - name: Start SSH agent
        uses: webfactory/ssh-agent@836c84ec59a0e7bc0eabc79988384eb567561ee2 # v0.7.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_KEY }}

      - name: Find stale PR deployments
        id: find
        env:
          ANSIBLE_VAULT_PASSWORD: ${{ secrets.ANSIBLE_VAULT_PASSWORD }}
        run: |
          set -e

          # Run ad-hoc command on both servers to find pr-* dirs older than 7 days
          RAW_OUTPUT=$(cd deploy && ansible full-app -m shell \
            -a "find ~/deployments -maxdepth 1 -name 'pr-*' -type d -mtime +7 -printf '%f\n' 2>/dev/null || true" \
            --limit 100.96.253.40,100.107.248.71 2>&1) || true

          echo "Raw output:"
          echo "$RAW_OUTPUT"

          # Extract PR numbers from directory names like "pr-123"
          PR_NUMBERS=$(echo "$RAW_OUTPUT" | grep -oP 'pr-\K\d+' | sort -un)

          if [ -z "$PR_NUMBERS" ]; then
            echo "No stale PR deployments found"
            echo "pr_numbers=[]" >> "$GITHUB_OUTPUT"
            echo "has_stale=false" >> "$GITHUB_OUTPUT"
          else
            # Build JSON array
            JSON_ARRAY=$(echo "$PR_NUMBERS" | jq -R -s 'split("\n") | map(select(. != "")) | map(tonumber)')
            echo "Found stale PRs: $JSON_ARRAY"
            echo "pr_numbers=$JSON_ARRAY" >> "$GITHUB_OUTPUT"
            echo "has_stale=true" >> "$GITHUB_OUTPUT"
          fi

  cleanup:
    needs: [discover]
    if: needs.discover.outputs.has_stale == 'true'
    runs-on: [self-hosted]
    environment: deploy
    env:
      ANSIBLE_VAULT_PASSWORD: ${{ secrets.ANSIBLE_VAULT_PASSWORD }}
      ANSIBLE_DEBIAN_PASSWORD: ${{ secrets.ANSIBLE_DEBIAN_PASSWORD }}
    permissions:
      contents: read
      packages: write
      deployments: write
    strategy:
      matrix:
        pr_number: ${{ fromJSON(needs.discover.outputs.pr_numbers) }}
      max-parallel: 1
      fail-fast: false

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false

      - name: Deactivate GitHub deployments
        env:
          PR_NUMBER: ${{ matrix.pr_number }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -e

          echo "Starting deployment cleanup for PR ${PR_NUMBER}"

          ENVIRONMENTS=("preview-dango-frontend" "preview-dango-api" "preview-dango-metrics" "preview-faucet-bot" "preview-cometbft-p2p" "preview-cometbft-rpc" "preview-cometbft-abci" "preview-cometbft-metrics")

          TOTAL_DEACTIVATED=0
          TOTAL_ERRORS=0

          for env in "${ENVIRONMENTS[@]}"; do
            echo "Checking environment: ${env}"
            page=1
            env_deactivated=0

            while true; do
              response=$(curl -s -w "%{http_code}" \
                -H "Authorization: token ${GH_TOKEN}" \
                "https://api.github.com/repos/${GH_REPO}/deployments?environment=${env}&page=${page}&per_page=100")

              http_code="${response: -3}"
              response_body="${response%???}"

              if [ "$http_code" -ne 200 ]; then
                echo "ERROR: Failed to fetch deployments for $env (HTTP $http_code)"
                TOTAL_ERRORS=$((TOTAL_ERRORS + 1))
                break
              fi

              if [ "$(echo "$response_body" | jq '. | length')" -eq 0 ]; then
                break
              fi

              DEPLOYMENT_IDS=$(echo "$response_body" | \
                jq -r --arg pr "PR ${PR_NUMBER}" \
                  '.[] | select(.description | contains($pr)) | .id')

              for id in $DEPLOYMENT_IDS; do
                if [ "$id" != "null" ] && [ -n "$id" ]; then
                  echo "  Deactivating deployment ID: $id"

                  deactivate_response=$(curl -s -w "%{http_code}" -X POST \
                    -H "Authorization: token ${GH_TOKEN}" \
                    -H "Accept: application/vnd.github.v3+json" \
                    "https://api.github.com/repos/${GH_REPO}/deployments/${id}/statuses" \
                    -d '{"state":"inactive","description":"Stale PR deployment cleaned up"}')

                  deactivate_code="${deactivate_response: -3}"
                  if [ "$deactivate_code" -eq 200 ] || [ "$deactivate_code" -eq 201 ]; then
                    echo "    SUCCESS: Deployment $id deactivated"
                    env_deactivated=$((env_deactivated + 1))
                    TOTAL_DEACTIVATED=$((TOTAL_DEACTIVATED + 1))
                  else
                    echo "    ERROR: Failed to deactivate deployment $id (HTTP $deactivate_code)"
                    echo "    Response: ${deactivate_response%???}"
                    TOTAL_ERRORS=$((TOTAL_ERRORS + 1))
                  fi
                fi
              done

              ((page++))
            done

            if [ $env_deactivated -eq 0 ]; then
              echo "  No deployments found for PR ${PR_NUMBER}"
            else
              echo "  Deactivated $env_deactivated deployment(s) in $env"
            fi
            echo
          done

          echo "=== DEPLOYMENT CLEANUP SUMMARY ==="
          echo "Total deployments deactivated: $TOTAL_DEACTIVATED"
          echo "Total errors: $TOTAL_ERRORS"

          if [ $TOTAL_ERRORS -gt 0 ]; then
            echo "WARNING: Some operations failed. Check logs above for details."
          else
            echo "SUCCESS: All deployments cleaned up successfully"
          fi

      - name: Delete PR container images
        continue-on-error: true
        env:
          PR_NUMBER: ${{ matrix.pr_number }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -e

          echo "Starting GHCR cleanup for PR ${PR_NUMBER}"

          # For stale PRs the branch may be gone, so we can only clean up
          # the pr-latest tags. Commit-specific tags are handled by the
          # daily GHCR cleanup cron.

          delete_image_versions() {
            local package=$1
            local tag=$2

            echo "Processing $package:$tag"

            local versions_response=$(curl -s -w "%{http_code}" \
              -H "Authorization: token ${GH_TOKEN}" \
              "https://api.github.com/orgs/left-curve/packages/container/${package}/versions")

            local http_code="${versions_response: -3}"
            if [ "$http_code" -ne 200 ]; then
              echo "WARNING: Failed to fetch versions for $package (HTTP $http_code)"
              return 1
            fi

            local version_id=$(echo "${versions_response%???}" | \
              jq -r --arg tag "$tag" '.[] | select(.metadata.container.tags[]? == $tag) | .id' 2>/dev/null)

            if [ $? -ne 0 ]; then
              echo "WARNING: Failed to parse versions response for $package:$tag"
              return 1
            fi

            if [ "$version_id" = "null" ] || [ -z "$version_id" ]; then
              echo "INFO: Version $package:$tag not found (may already be deleted)"
              return 0
            fi

            echo "Deleting $package:$tag (ID: $version_id)"
            local delete_response=$(curl -s -w "%{http_code}" -X DELETE \
              -H "Authorization: token ${GH_TOKEN}" \
              "https://api.github.com/orgs/left-curve/packages/container/${package}/versions/${version_id}")

            local delete_code="${delete_response: -3}"
            if [ "$delete_code" -eq 200 ] || [ "$delete_code" -eq 204 ]; then
              echo "SUCCESS: Deleted $package:$tag"
              return 0
            else
              echo "ERROR: Failed to delete $package:$tag (HTTP $delete_code)"
              echo "Response: ${delete_response%???}"
              return 1
            fi
          }

          PACKAGES=("left-curve%2Fdango" "left-curve%2Fdango-frontend")
          for package in "${PACKAGES[@]}"; do
            delete_image_versions "$package" "pr-${PR_NUMBER}-latest" || true
          done

      - name: Install Ansible
        run: |
          pipx install ansible
          echo "${HOME}/.local/bin" >> $GITHUB_PATH
          ln -sf ~/.local/pipx/venvs/ansible/bin/ansible-galaxy ~/.local/bin/ansible-galaxy
          ln -sf ~/.local/pipx/venvs/ansible/bin/ansible-playbook ~/.local/bin/ansible-playbook

      - name: Install collections
        run: |
          ansible-galaxy collection install -r deploy/requirements.yml

      - name: Start SSH agent
        uses: webfactory/ssh-agent@836c84ec59a0e7bc0eabc79988384eb567561ee2 # v0.7.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_KEY }}

      - name: Delete PR deployment on servers
        env:
          PR_NUMBER: ${{ matrix.pr_number }}
        run: |
          cd deploy
          ansible-playbook delete-full-app.yml -e deployment_name=pr-${PR_NUMBER} --limit 100.96.253.40,100.107.248.71
